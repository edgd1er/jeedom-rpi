name: Docker buildx armhf+amd64 v4 stable

on:
  workflow_dispatch:
    inputs:
      jdm_version:
        description: 'jeedom version'
        required: true
        default: 'latest'
        type: string
#  push:
#    branches:
#      - master
#    paths-ignore:
#      - '.github/**'

jobs:
  build-v4:
    uses: ./.github/workflows/dockerimage-buildx-template.yml
    with:
      image_name: jeedom-rpi
      jdm_version: latest
      tag: latest
      version: master
      #12 bookworm stable
      distro: 12-slim
      push: true
    secrets: inherit
